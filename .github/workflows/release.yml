name: Package Addon ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create addon directory
        run: |
          ADDON="${{ github.event.repository.name }}"
          mkdir -p build/$ADDON
          cp LICENSE build/$ADDON/ || true
          cp pia-wireguard-cfg.exe build/$ADDON/ || true
          cp README.md build/$ADDON/ || true
          cp README.html build/$ADDON/ || true

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert README.md to HTML (self-contained)
        run: |
          ADDON="${{ github.event.repository.name }}"
          pandoc README.md -f gfm -t html -s --self-contained \
            -o build/$ADDON/README.html || true

      - name: Create ZIP
        run: |
          ADDON="${{ github.event.repository.name }}"
          cd build
          zip -r "$ADDON-${GITHUB_REF_NAME}.zip" "$ADDON"

      - name: Debug: list build output
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          ls -la build
          ls -la build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip || true

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed — no release was created."

      - name: Create or update GitHub Release and upload assets
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
