name: Package Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for full git history

      - name: Create addon directory
        run: |
          ADDON="${{ github.event.repository.name }}"
          mkdir -p build/$ADDON
          cp LICENSE build/$ADDON/
          cp pia-wireguard-cfg.exe build/$ADDON/
          cp pia-wireguard-cfg build/$ADDON/
          cp README.md build/$ADDON/
          cp README.html build/$ADDON/ || true

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert README.md to HTML (self-contained)
        run: |
          ADDON="${{ github.event.repository.name }}"
          pandoc README.md -f gfm -t html -s --self-contained \
            -o build/$ADDON/README.html

      - name: Generate release_history.txt
        run: |
          git log \
            --pretty=format:"COMMIT %ad %s" \
            --date=short \
            --numstat \
            | awk '
              /^COMMIT / {
                  if (started) print "";
                  started=1;
                  sub(/^COMMIT /, "— ");
                  print;
                  next;
              }
              /^[0-9-]/ {
                  ins=$1; del=$2;
                  file=$3;
                  for (i=4; i<=NF; i++) file = file " " $i;

                  if (ins=="-" && del=="-") {
                      printf "    %s | added\n", file;
                      next;
                  }

                  printf "    %s | %s insertion%s, %s deletion%s\n",
                      file,
                      ins, (ins=="1"?"":"s"),
                      del, (del=="1"?"":"s");
                  next;
              }
            ' > release_history.txt

      # ---------------------------------------------------------
      # FIX: Commit release_history.txt BEFORE switching branches
      # ---------------------------------------------------------
      - name: Commit updated release_history.txt
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add release_history.txt

          if ! git diff --cached --quiet; then
            git commit -m "Update release_history.txt for ${{ github.ref_name }}"
          else
            echo "No changes to commit."
          fi

      # ---------------------------------------------------------
      # Now it is safe to switch branches
      # ---------------------------------------------------------
      - name: Switch to current branch
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          REF=${GITHUB_REF}
          if [[ "$REF" == refs/tags/* ]]; then
            BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
            git checkout "$BRANCH"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            git checkout "$BRANCH"
          fi

      - name: Push commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: git push

      - name: Create ZIP
        run: |
          ADDON="${{ github.event.repository.name }}"
          cd build
          zip -r "$ADDON-${GITHUB_REF_NAME}.zip" "$ADDON"

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed — no release was created."

      - name: Upload Release Asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
            release_history.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
